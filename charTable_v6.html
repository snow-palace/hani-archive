<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色数据表 - 开发者速查版</title>
    <link rel="icon" href="images/icon/website_logo.webp" type="image/webp">
    <style>
        /* 开发者深色主题变量 */
        :root {
            --bg-page: #1a1a1a;
            --grid-line: rgba(255, 255, 255, 0.04);
            --bg-row-odd: #24252850;
            --bg-row-even: #323335;
            --bg-hover: #252525;
            --text-main: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-light: #3f3f46;
            --bg-tag: #3f3f46;
            --bg-bio: rgba(0, 0, 0, 0.25);
            --bg-club-logo: #18181b; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background-color: var(--bg-page);
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 15px 15px;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            font-size: 13px;
            line-height: 1.5;
        }

        .container { max-width: 1060px; margin: 0 auto; }
        .header { margin-bottom: 20px; }
        .title { font-size: 20px; font-weight: bold; color: #f8fafc; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        .table-container {
            background: #1e1e1e; border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            overflow: hidden; border: 1px solid #404040;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        colgroup col.col-portrait { width: 110px; }
        colgroup col.col-name { width: 380px; }
        colgroup col.col-school { width: 200px; }
        colgroup col.col-stats { width: auto; }

        thead { background: #111111; border-bottom: 2px solid #52525b; }
        th { padding: 16px; font-size: 12px; font-weight: bold; color: var(--text-secondary); text-align: left; }
        th.text-center { text-align: center; }

        tbody tr:nth-child(odd) { background-color: var(--bg-row-odd); }
        tbody tr:nth-child(even) { background-color: var(--bg-row-even); }
        tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.15s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background-color: var(--bg-hover); }

        td { vertical-align: top; padding: 20px 16px; }

        /* 对齐布局器 */
        .row-top { display: flex; align-items: center; min-height: 28px; margin-bottom: 14px; }
        .row-bottom { display: flex; flex-direction: column; justify-content: flex-start; }

        /* 列 1: 头像 */
        .cell-portrait { padding: 0 !important; position: relative; }
        .portrait-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .portrait { display: block; width: 100%; height: 100%; object-fit: cover; object-position: center 15%; border-right: 1px solid var(--border-light); opacity: 0.95; }
        
        /* 无头像时的占位 */
        .portrait-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: #2a2a2a; color: #555; font-size: 12px; font-weight: bold; writing-mode: vertical-rl; letter-spacing: 4px; border-right: 1px solid var(--border-light); }

        /* 列 2: 信息 */
        .name-header { display: flex; align-items: center; gap: 12px; width: 100%; }
        .nickname { font-size: 18px; font-weight: bold; letter-spacing: 0.5px; filter: brightness(1.2); }
        .info-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag { background: var(--bg-tag); color: #cbd5e1; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .tag-job { background: rgba(14, 165, 233, 0.15); color: #38bdf8; box-shadow: 0 0 0 1px rgba(14, 165, 233, 0.4) inset; }
        
        .badges { display: flex; gap: 6px; align-items: center; }
        .crown-badge { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(135deg, #ca8a04, #b45309); color: #fefce8; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 6px; }
        .crown-badge svg { width: 14px; height: 14px; }
        .chair-icon { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }
        .chair-icon svg { width: 18px; height: 18px; stroke: #000; stroke-width: 2px; fill: none; }
        .chair-icon .chair-path { fill: currentColor; stroke: none; }
        .chair-white { color: #f8fafc; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.5)); }
        .chair-cyan { color: #22d3ee; }
        .chair-yellow { color: #fde047; }
        .chair-green { color: #4ade80; }
        .chair-rose { color: #fb7185; }

        .bio { font-size: 12px; color: var(--text-secondary); line-height: 1.6; background: var(--bg-bio); padding: 10px 14px; border-radius: 0 8px 8px 0; border-left: 4px solid var(--border-light); }

        /* 列 3: 组织 */
        .org-block { display: flex; flex-direction: column; gap: 14px; }
        .org-item { display: flex; align-items: center; gap: 12px; }
        
        /* 放大 Logo 尺寸 */
        .org-logo { width: 52px; height: 52px; object-fit: contain; }
        /* 社徽深色底板，去除了 padding 让图片铺满容器 */
        .org-logo-club {
            background: var(--bg-club-logo);
            border-radius: 8px;
            padding: 0; 
            object-fit: cover; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        
        .org-text-group { display: flex; flex-direction: column; justify-content: center;}
        .org-name { font-size: 14px; font-weight: bold; color: var(--text-main); }
        .org-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        /* 列 4: 属性与状态 */
        .attrs { display: flex; gap: 8px; }
        .attr { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); padding: 4px 10px 4px 6px; border-radius: 6px; border: 1px solid var(--border-light); }
        .attr img { width: 18px; height: 18px; object-fit: contain; }
        .attr span { font-size: 12px; color: #f1f5f9; font-weight: bold; }

        .stats { display: flex; flex-direction: column; gap: 8px; width: 100%;}
        .stat { display: flex; align-items: center; gap: 10px; }
        .stat-label { font-size: 11px; color: var(--text-secondary); width: 24px; text-align: right; font-weight: bold; }
        .stat-bar-bg { flex: 1; height: 6px; background: rgba(0,0,0,0.4); border-radius: 4px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.5); }
        .stat-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .stat-value { font-size: 12px; color: var(--text-main); width: 32px; text-align: left; font-weight: bold; }
    </style>
</head>

        // 社团强制排序权重
        const SocietyOrder = ['友谊百货', '冷凝塔', '不良少年宫', '炼厂', '蜂山广场', '哈尼哈尼', '三子星', '毛毛毛毛毛', '步可连连', '白楼'];

        // 3. 渲染引擎核心逻辑
        function renderTable() {
            const tbody = document.getElementById('character-table-body');
            
            // 过滤无用的占位符空位，并保留真实角色
            let characters = Object.values(charData).filter(c => c.name && c.clickable !== false);

            // 核心排布逻辑：优先社团权重，其次按参加年限(join)
            characters.sort((a, b) => {
                const getIndex = soc => SocietyOrder.indexOf(soc) > -1 ? SocietyOrder.indexOf(soc) : 999;
                if (a.society !== b.society) {
                    return getIndex(a.society) - getIndex(b.society);
                }
                return (a.join || '').localeCompare(b.join || '');
            });

            // 遍历生成 HTML
            let html = '';
            characters.forEach(char => {
                // 计算属性槽
                let attrsHtml = '';
                if (char.attr1) attrsHtml += `<div class="attr"><img src="${char.attr1}" alt="属性"><span>${AttrNames[char.attr1] || ''}</span></div>`;
                if (char.attr2) attrsHtml += `<div class="attr"><img src="${char.attr2}" alt="属性"><span>${AttrNames[char.attr2] || ''}</span></div>`;

                // 计算数值条百分比 (以 250 为单项满分基准)
                const maxStat = 250;
                const getBar = val => `<div class="stat-bar-bg"><div class="stat-fill" style="width:${Math.min(100, (val/maxStat)*100)}%;background:${char.color};"></div></div>`;

                // 徽章系统
                let badgesHtml = '';
                if (char.isKing) {
                    badgesHtml += `<span class="crown-badge"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 1L9 9l-7-3 3 14h14l3-14-7 3-3-8z" fill="currentColor"/></svg>首席</span>`;
                }
                if (char.chairs && char.chairs.length > 0) {
                    char.chairs.forEach(c => {
                        let lineSvg = char.isChairForbidden ? `<line x1="4" y1="4" x2="20" y2="20" stroke="#000" stroke-width="3"/>` : '';
                        badgesHtml += `<span class="chair-icon chair-${c}"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path class="chair-path" d="M7 2a2 2 0 0 0-2 2v7H4a1 1 0 0 0-1 1v4h1v6h2v-6h12v6h2v-6h1v-4a1 1 0 0 0-1-1h-1V4a2 2 0 0 0-2-2H7zm0 2h10v7H7V4z"/>${lineSvg}</svg></span>`;
                    });
                }

                // 校名简称转换
                const shortSchool = SchoolShortNames[char.school] || char.school;
                
                // 处理立绘图片
                const portraitHtml = char.portrait 
                    ? `<img class="portrait" src="${char.portrait}" alt="${char.name}">`
                    : `<div class="portrait-placeholder">NO DATA</div>`;

                // 生成单行 HTML 模板
                html += `
                <tr>
                    <td class="cell-portrait">
                        <div class="portrait-wrapper">
                            ${portraitHtml}
                        </div>
                    </td>
                    <td>
                        <div class="row-top">
                            <div class="name-header">
                                <div class="nickname" style="color: ${char.color};">${char.name}</div> 
                                <div class="badges">${badgesHtml}</div>
                            </div>
                        </div>
                        <div class="row-bottom">
                            <div class="info-tags">
                                <span class="tag">${char.gender} · ${char.age}岁</span>
                                ${char.join ? `<span class="tag">赛季：${char.join.split(' ')[0]}</span>` : ''}
                                <span class="tag">姓名：${char.real || '-'}</span>
                            </div>
                            <div class="bio" style="border-left-color: ${char.color};">
                                ${char.bio || '暂无简介'}
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="row-top"></div>
                        <div class="row-bottom">
                            <div class="org-block">
                                <div class="org-item">
                                    <img class="org-logo" src="${char.schoolLogo}" alt="校徽">
                                    <div class="org-text-group"><span class="org-name">${shortSchool}</span><span class="org-sub">学校</span></div>
                                </div>
                                <div class="org-item">
                                    <img class="org-logo org-logo-club" src="${char.societyLogo}" alt="社徽">
                                    <div class="org-text-group"><span class="org-name">${char.society || '无组织'}</span><span class="org-sub">社团</span></div>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="row-top" style="justify-content: space-between;">
                            <div class="attrs">${attrsHtml}</div>
                            ${char.job ? `<span class="tag tag-job">${char.job}</span>` : ''}
                        </div>
                        <div class="row-bottom">
                            <div class="stats">
                                <div class="stat"><span class="stat-label">体力</span>${getBar(char.hp)}<span class="stat-value">${char.hp}</span></div>
                                <div class="stat"><span class="stat-label">物攻</span>${getBar(char.patk)}<span class="stat-value">${char.patk}</span></div>
                                <div class="stat"><span class="stat-label">物防</span>${getBar(char.pdef)}<span class="stat-value">${char.pdef}</span></div>
                                <div class="stat"><span class="stat-label">法攻</span>${getBar(char.matk)}<span class="stat-value">${char.matk}</span></div>
                                <div class="stat"><span class="stat-label">法防</span>${getBar(char.mdef)}<span class="stat-value">${char.mdef}</span></div>
                            </div>
                        </div>
                    </td>
                </tr>`;
            });

            tbody.innerHTML = html;
        }

        // 页面加载完毕后执行渲染
        window.addEventListener('DOMContentLoaded', renderTable);
    </script>
